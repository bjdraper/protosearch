name: protosearch
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip

  # Bioinformatics tools (system-level)
  - hmmer=3.4
  - mafft=7.526
  - fasttree=2.2.0
  - foldseek

  # Core science
  - numpy=2.4.3
  - pandas=3.0.2
  - scipy
  - scikit-learn=1.8.0
  - biopython=1.87

  # Clustering / dimensionality reduction
  - igraph=1.0.1
  - leidenalg=0.11.0
  - logomaker=0.8.6

  # Visualisation
  - matplotlib-base=3.10.8
  - seaborn=0.13.2

  # Config / utils
  - pyyaml=6.0.3
  - requests=2.33.1
  - tqdm=4.67.3

  - pip:
    - fair-esm==2.0.0
    - faiss-cpu==1.13.2
    - openTSNE
    - ete3==3.1.3
    - py3Dmol
    - transformers==5.6.2
    - accelerate==1.13.0
    - torch==2.11.0
